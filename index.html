<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursed Profile Card</title>
    <!-- CSS is externally linked here! -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Clue: This acts as the main standalone container/article for the profile -->
    <div class="card-container">

        <!-- Clue: The introductory/header section of this card -->
        <div class="card-top">
            <!-- Clue: The most important, top-level heading on the page -->
            <div class="name-text">Alex Coder</div>

            <!-- Clue: A self-contained figure/image -->
            <div class="img-wrapper">
                <img src="https://ui-avatars.com/api/?name=AC&size=150&background=random" alt="Profile Picture">
                <!-- Clue: The caption for the figure above -->
                <div class="img-text">Code Breaker</div>
            </div>
        </div>

        <!-- Clue: The primary main content of this card -->
        <div class="card-body">

            <!-- Clue: A thematic grouping/section of content (About Me) -->
            <div class="about-section">
                <!-- Clue: A secondary heading -->
                <div class="sub-heading">About Me</div>
                <!-- Clue: A standard paragraph of text -->
                <div class="normal-text">I love building things, but looking at this div soup makes my eyes bleed.</div>
            </div>

            <!-- Clue: A thematic grouping/section of content (Skills) -->
            <div class="skills-section">
                <!-- Clue: A secondary heading -->
                <div class="sub-heading">My Skills</div>

                <!-- Clue: An unordered list of items -->
                <div class="list-container">
                    <!-- Clue: Individual list items -->
                    <div class="list-item">Frontend</div>
                    <div class="list-item">Backend</div>
                    <div class="list-item">Div Soup (Expert)</div>
                </div>
            </div>
        </div>

        <!-- Clue: The concluding footer section of the card -->
        <div class="card-bottom">
            <!-- Clue: A navigation area for links -->
            <div class="links-area">
                <!-- Clue: Anchor tags (links) that should go somewhere -->
                <div class="link-btn" href="https://github.com">GitHub</div>
                <div class="link-btn" href="https://linkedin.com">LinkedIn</div>
            </div>
        </div>

    </div>

</body>

</html>
